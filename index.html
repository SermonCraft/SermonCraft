  .lang{display:flex;align-items:center;gap:6px;background:var(--light);border:1px solid var(--line);border-radius:8px;padding:5px 8px;}
  .lang svg{width:15px;height:15px;color:var(--purple);flex-shrink:0;}

  .langnote{margin-top:14px;font-size:13px;color:var(--purple);background:var(--light);display:inline-block;padding:6px 12px;border-radius:20px;}

  .tcard{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:22px;text-align:left;cursor:pointer;transition:border-color .15s,transform .15s;}
  .tcard:hover{border-color:var(--purple-mid);transform:translateY(-2px);}

/* ---------- API call (posts to your serverless function) ---------- */
async function callGenerate({ system, prompt, max_tokens }){
  const r = await fetch("/api/generate", {
    method:"POST",
    headers:{ "content-type":"application/json" },
    body: JSON.stringify({ system, prompt, max_tokens: max_tokens || 1600 })
  });
  if(!r.ok) throw new Error("request failed");
  const data = await r.json();
  if(data.error || !data.text) throw new Error(data.error || "no text");
  return data.text;
}

function useGen(tool){
  const [result,setResult] = useState("");
  const [loading,setLoading] = useState(false);
  const [preview,setPreview] = useState(false);
  const [savedId,setSavedId] = useState(null);
  async function run(system, prompt, sample, maxTokens, language){
    setLoading(true); setSavedId(null);
    try{
      const text = await callGenerate({ system, prompt, max_tokens:maxTokens });
      setResult(text); setPreview(false);
      const row = await saveGeneration(tool || "Generation", language || "English", text);
      if(row) setSavedId(row.id);
    }catch(e){
      setResult(sample || ""); setPreview(true);
    }finally{ setLoading(false); }
  }
  return { result, setResult, loading, preview, run, savedId };
}

  return <div className="banner"><span>ℹ️</span><span><b>Preview mode.</b> This is a sample. Connect your Claude API key (see the README) to generate live, custom results in your chosen language.</span></div>;
}

function printContent(value){
  const w = window.open("", "_blank");
  if(!w){ alert("Please allow pop-ups for this site to print."); return; }
  const esc = value.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  w.document.write(`<!DOCTYPE html><html><head><title>SermonCraft</title><style>
    body{font-family:Georgia,'Times New Roman',serif;color:#1a1a2e;max-width:720px;margin:40px auto;padding:0 24px;line-height:1.6;}
    .ph{display:flex;align-items:center;gap:10px;border-bottom:2px solid #3C3489;padding-bottom:10px;margin-bottom:24px;}
    .pm{width:24px;height:24px;background:#3C3489;border-radius:5px;}
    .pn{font-size:16px;font-weight:bold;color:#3C3489;letter-spacing:0.02em;}
    pre{white-space:pre-wrap;font-family:Georgia,'Times New Roman',serif;font-size:13.5pt;line-height:1.65;}
    .pf{margin-top:32px;border-top:1px solid #ccc;padding-top:10px;font-size:9pt;color:#888;}
    @media print{ body{margin:0 auto;} }
  </style></head><body>
    <div class="ph"><div class="pm"></div><div class="pn">SermonCraft</div></div>
    <pre>${esc}</pre>
    <div class="pf">Prepared with SermonCraft — a starting point, shaped by your own study and voice.</div>
  </body></html>`);
  w.document.close();
  w.focus();
  setTimeout(()=>{ w.print(); }, 300);
}

function ResultPanel({ value, onChange, preview, filename, savedId }){
  const auth = useContext(AuthCtx);
  const [saveMsg,setSaveMsg] = useState("");
  function copy(){ navigator.clipboard && navigator.clipboard.writeText(value); }
  function download(){
    const blob = new Blob([value], { type:"text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename || "sermoncraft.txt"; a.click();
    URL.revokeObjectURL(url);
  }
  async function saveEdits(){
    const ok = await updateGeneration(savedId, value);
    setSaveMsg(ok ? "Changes saved ✓" : "Couldn't save — try again");
    setTimeout(()=>setSaveMsg(""), 2500);
  }
  return (
    <div className="result">
      {preview && <PreviewBanner/>}
      <textarea className="rtext" value={value} onChange={e=>onChange(e.target.value)} />
      <div className="ractions">
        <button onClick={copy}>Copy</button>
        <button onClick={download}>Download .txt</button>
        <button onClick={()=>printContent(value)}>🖨 Print</button>
        {savedId && <button onClick={saveEdits}>Save changes</button>}
        {saveMsg && <span style={{fontSize:"12.5px",color:"var(--purple)",alignSelf:"center"}}>{saveMsg}</span>}
      </div>
      <p style={{fontSize:"12.5px",color:"var(--muted)",marginTop:"10px"}}>
        {savedId ? "✓ Saved to your library. " : (sb && !auth.user && !preview ? <span>Want to keep this? <a href="#" onClick={e=>{e.preventDefault();auth.openAuth();}}>Sign in</a> to save it to your library. </span> : "")}
        Fully editable — shape it in your own voice before you preach or teach.
      </p>
    </div>
  );
}

/* ---------- Tool: Concordance ---------- */
function ConcordanceTool({ language }){
  const [word,setWord]=useState(""); const [entry,setEntry]=useState(null);
  const [aiText,setAiText]=useState(""); const [preview,setPreview]=useState(false);
  const [loading,setLoading]=useState(false); const [savedId,setSavedId]=useState(null);
  async function go(){
    const key = word.trim().toLowerCase();
    setEntry(null); setAiText(""); setSavedId(null);
    // English + known word => instant, accurate, free static lookup
    if(language==="English" && LEXICON[key]){ setEntry(LEXICON[key]); return; }
    // otherwise generate the study (in the chosen language)
    setLoading(true);
    const sys = "You are a careful biblical-languages scholar. Give accurate original-language word-study data. If you are unsure of a Strong's number or form, say so rather than guessing.";
    const prompt = `Provide a word study for the English Bible word "${word}". Give: the primary underlying Greek or Hebrew word in its original script; transliteration and a simple pronunciation guide; the Strong's number; root meaning and etymology; how it differs from similar words; 2–3 key passages where it appears; its theological significance; and preaching insights for bringing it to life from the pulpit.`+langLine(language);
    try{ const t = await callGenerate({ system:sys, prompt, max_tokens:1200 }); setAiText(t); setPreview(false); const row = await saveGeneration("Word study", language, t); setSavedId(row ? row.id : null); }
    catch(e){ setAiText("(Preview mode — connect your API key for a live word study in your chosen language.)\n\nFor English words like: love, grace, faith, peace, mercy, holy, glory, spirit — a full, accurate study appears instantly even without the API."); setPreview(true); }
    finally{ setLoading(false); }
  }
  return (
    <div>
      <div className="toolhead"><h2>Greek &amp; Hebrew Concordance</h2><p>Type an English Bible word to see the original word, its meaning, and how to preach it. Common words load instantly and accurately; others are generated in your language.</p></div>
      <div className="card">
        <Text label="English Bible word" hint="try: love, grace, faith, peace, mercy" value={word} onChange={setWord} placeholder="grace" />
        <button className="btn" onClick={go} disabled={loading}>{loading?"Looking up…":"Look up word"}</button>
        {loading && <Loading/>}
        {entry && (
          <div className="concard">
            <div className="conhead"><div className="orig">{entry.orig}</div><div className="tr">{entry.tr} · Strong's {entry.strong}</div></div>
            <div className="conbody">
              <div className="conrow"><div className="k">Root meaning</div><div className="v">{entry.root}</div></div>
              <div className="conrow"><div className="k">Compared to</div><div className="v">{entry.diff}</div></div>
              <div className="conrow"><div className="k">Key passages</div><div className="v">{entry.passages}</div></div>
              <div className="conrow"><div className="k">Significance</div><div className="v">{entry.sig}</div></div>
              <div className="conrow"><div className="k">Preaching insight</div><div className="v">{entry.insight}</div></div>
            </div>
          </div>
        )}
        {aiText && !loading && (
          <div>
            {!preview && <div className="banner" style={{marginTop:"22px"}}><span>ℹ️</span><span>AI-generated — please verify original-language details against a trusted lexicon before preaching.</span></div>}
            <ResultPanel value={aiText} onChange={setAiText} preview={preview} savedId={savedId} filename="word-study.txt" />
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------- Accounts UI ---------- */
function AuthModal({ mode, setMode, onClose }){
  const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
  const [msg,setMsg]=useState(""); const [busy,setBusy]=useState(false);
  const [news,setNews]=useState(false);
  async function submit(){
    if(!sb) return;
    setBusy(true); setMsg("");
    try{
      if(mode==="signup"){
        const { data, error } = await sb.auth.signUp({ email, password: pw, options: { data: { newsletter_opt_in: news } } });
        if(error) throw error;
        if(data.session){ onClose(); }
        else setMsg("Almost there — check your email for a confirmation link, then sign in.");
      } else if(mode==="signin"){
        const { error } = await sb.auth.signInWithPassword({ email, password: pw });
        if(error) throw error;
        onClose();
      } else if(mode==="forgot"){
        const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin });
        if(error) throw error;
        setMsg("Check your email for a password reset link.");
      } else if(mode==="reset"){
        const { error } = await sb.auth.updateUser({ password: pw });
        if(error) throw error;
        setMsg("Password updated — you're signed in.");
        setTimeout(onClose, 1200);
      }
    }catch(e){ setMsg(e.message || "Something went wrong — please try again."); }
    finally{ setBusy(false); }
  }
  const titles={signin:"Welcome back",signup:"Create your free account",forgot:"Reset your password",reset:"Choose a new password"};
  const buttons={signin:"Sign in",signup:"Create account",forgot:"Send reset link",reset:"Set new password"};
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>{titles[mode]}</h3>
        {mode!=="reset" && <div className="field"><label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@email.com" /></div>}
        {mode!=="forgot" && <div className="field"><label>{mode==="reset"?"New password":"Password"}</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="At least 6 characters" /></div>}
        {mode==="signup" && <label className="newsopt"><input type="checkbox" checked={news} onChange={e=>setNews(e.target.checked)} /><span>Email me occasional SermonCraft news and ministry resources <b>(optional)</b></span></label>}
        <button className="btn" style={{width:"100%"}} disabled={busy} onClick={submit}>{busy ? "One moment…" : buttons[mode]}</button>
        {msg && <p className="authmsg">{msg}</p>}
        <div className="authlinks">
          {mode==="signin" && <React.Fragment>
            <a href="#" onClick={e=>{e.preventDefault();setMode("signup");}}>Create an account</a>
            <a href="#" onClick={e=>{e.preventDefault();setMode("forgot");}}>Forgot password?</a>
          </React.Fragment>}
          {mode==="signup" && <a href="#" onClick={e=>{e.preventDefault();setMode("signin");}}>I already have an account</a>}
          {mode==="forgot" && <a href="#" onClick={e=>{e.preventDefault();setMode("signin");}}>Back to sign in</a>}
        </div>
        <p style={{fontSize:"11.5px",color:"var(--muted)",marginTop:"14px"}}>Accounts are free — they simply save your sermons and lessons so you can come back to them any time.</p>
      </div>
    </div>
  );
}

function LibraryView(){
  const auth = useContext(AuthCtx);
  const [items,setItems]=useState(null);
  const [openId,setOpenId]=useState(null);
  useEffect(()=>{
    if(sb && auth.user){
      sb.from("generations").select("id,tool,title,language,content,created_at").order("created_at",{ascending:false}).limit(200)

    <div>
      <div className="toolhead"><h2>My Library</h2><p>Everything you've generated, newest first. Click any item to open it.</p></div>

              <div className="libmeta">{it.tool} · {it.language} · {new Date(it.created_at).toLocaleDateString()}</div>

            <span className="libchev">{openId===it.id ? "▾" : "▸"}</span>

          {openId===it.id && (

                <button onClick={()=>navigator.clipboard&&navigator.clipboard.writeText(it.content)}>Copy</button>

              </div>
            </div>
          )}
        </div>
      ))}

  );

function NotesView(){
  const auth = useContext(AuthCtx);
  const [notes,setNotes]=useState(null);
  const [edit,setEdit]=useState(null);
  const [busy,setBusy]=useState(false);
  function load(){
    sb.from("notes").select("id,title,content,updated_at").order("updated_at",{ascending:false}).limit(200)
      .then(({data})=>setNotes(data||[]));
  }
  useEffect(()=>{ if(sb && auth.user){ load(); } else { setNotes(null); } },[auth.user]);
  async function save(){
    if(!edit) return;
    setBusy(true);
    const payload = { title:(edit.title||"Untitled note").trim(), content:edit.content||"", updated_at:new Date().toISOString() };
    if(edit.id){ await sb.from("notes").update(payload).eq("id",edit.id); }
    else { await sb.from("notes").insert(payload); }
    setBusy(false); setEdit(null); load();
  }
  async function remove(id){
    if(!window.confirm("Delete this note?")) return;
    await sb.from("notes").delete().eq("id",id);
    load();
  }
  if(!sb) return <div className="toolhead"><h2>My Notes</h2><p>Accounts aren't set up yet on this site. Site owner: see <b>SETUP-ACCOUNTS.md</b>.</p></div>;
  if(!auth.user) return (
    <div>
      <div className="toolhead"><h2>My Notes</h2><p>Sign in to keep personal notes — sermon thoughts, prayer points, planning — private to your account and there whenever you return.</p></div>
      <button className="btn" onClick={auth.openAuth}>Sign in / create free account</button>
    </div>
  );
  if(edit) return (
    <div>
      <div className="toolhead"><h2>{edit.id ? "Edit note" : "New note"}</h2></div>
      <div className="card">
        <div className="field"><label>Title</label><input type="text" value={edit.title} onChange={e=>setEdit({...edit,title:e.target.value})} placeholder="Sunday sermon thoughts" /></div>
        <div className="field"><label>Note</label><textarea style={{minHeight:"260px"}} value={edit.content} onChange={e=>setEdit({...edit,content:e.target.value})} placeholder="Write anything — it saves privately to your account." /></div>
        <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
          <button className="btn" onClick={save} disabled={busy}>{busy?"Saving…":"Save note"}</button>
          <button className="btn btn-ghost" onClick={()=>setEdit(null)}>Cancel</button>
          {edit.content ? <button className="btn btn-ghost" onClick={()=>printContent((edit.title?edit.title+"\n\n":"")+edit.content)}>🖨 Print</button> : null}
        </div>
      </div>
    </div>
  );
  return (
    <div>
      <div className="toolhead"><h2>My Notes</h2><p>Your personal notes — private to your account. Click one to open it.</p></div>
      <button className="btn" onClick={()=>setEdit({title:"",content:""})} style={{marginBottom:"16px"}}>+ New note</button>
      {notes===null && <Loading/>}
      {notes && notes.length===0 && <div className="card"><p style={{color:"var(--muted)"}}>No notes yet — click "New note" to write your first.</p></div>}
      {notes && notes.map(n=>(
        <div key={n.id} className="libitem">
          <div className="librow" onClick={()=>setEdit({id:n.id,title:n.title||"",content:n.content})}>
            <div>
              <div className="libtitle">{n.title || "Untitled note"}</div>
              <div className="libmeta">Updated {new Date(n.updated_at).toLocaleDateString()}</div>
            </div>
            <span className="libchev">✎</span>
          </div>
          <div style={{padding:"0 18px 12px"}}>
            <button onClick={()=>remove(n.id)} style={{fontSize:"12.5px",border:"1px solid var(--line)",background:"var(--white)",color:"#A3322C",borderRadius:"8px",padding:"5px 10px",cursor:"pointer",fontFamily:"inherit"}}>Delete</button>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ---------- App shell ---------- */
const TABS = [
  { id:"home", label:"Home" },
  { id:"outline", label:"Sermon Outline" },
  { id:"concordance", label:"Greek & Hebrew" },
  { id:"ideas", label:"Sermon Ideas" },
  { id:"sundayschool", label:"Sunday School" },
  { id:"youth", label:"Youth Group" },
  { id:"library", label:"My Library" },
  { id:"notes", label:"My Notes" }
];

function App(){
  const [view,setView] = useState("home");
  const [language,setLanguage] = useState("English");
  const [user,setUser] = useState(null);
  const [authMode,setAuthMode] = useState(null);
  useEffect(()=>{
    if(!sb) return;
    sb.auth.getSession().then(({data})=>setUser(data.session ? data.session.user : null));
    const { data:sub } = sb.auth.onAuthStateChange((event, session)=>{
      setUser(session ? session.user : null);
      if(event==="PASSWORD_RECOVERY") setAuthMode("reset");
    });
    return ()=>sub.subscription.unsubscribe();
  },[]);
  const openAuth = ()=>setAuthMode("signin");
  return (
    <AuthCtx.Provider value={{ user, openAuth }}>
      <header>
        <div className="wrap hrow">
          <div className="brand">
            <div className="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M4 4C4 4 8 3 12 5C16 3 20 4 20 4V19C20 19 16 18 12 20C8 18 4 19 4 19V4Z" stroke="white" strokeWidth="1.6" strokeLinejoin="round"/><line x1="12" y1="5" x2="12" y2="20" stroke="white" strokeWidth="1.6"/></svg></div>
            <div><span className="bname">SermonCraft</span><span className="btag">AI tools for pastors &amp; teachers</span></div>
          </div>
          <div className="hactions">
            <div className="lang" title="Language for generated sermons & lessons">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>
              <select value={language} onChange={e=>setLanguage(e.target.value)}>
                {LANGUAGES.map(l=> <option key={l} value={l}>{l}</option>)}
              </select>
            </div>
            {sb && !user && <button className="acct" onClick={openAuth}>Sign in</button>}
            {sb && user && <div className="acctwrap"><span className="acctmail" title={user.email}>{user.email}</span><button className="acct" onClick={()=>sb.auth.signOut()}>Sign out</button></div>}
            <a className="donate" href="#donate">♥ Donate</a>
          </div>
        </div>
      </header>
      <nav>
        <div className="wrap"><div className="tabs">
          {TABS.map(t=> <button key={t.id} className={"tab"+(view===t.id?" on":"")} onClick={()=>setView(t.id)}>{t.label}</button>)}
        </div></div>
      </nav>
      <main>
        <div className="wrap">
          {view==="home" && <Home go={setView} language={language} />}
          {view==="outline" && <OutlineTool language={language} />}
          {view==="concordance" && <ConcordanceTool language={language} />}
          {view==="ideas" && <IdeasTool language={language} />}
          {view==="sundayschool" && <SundayTool language={language} />}
          {view==="youth" && <YouthTool language={language} />}
          {view==="library" && <LibraryView/>}
          {view==="notes" && <NotesView/>}
        </div>
      </main>
      <footer id="donate">
        <div className="wrap">
          <div className="fdon">💜 <b>SermonCraft is free.</b> If it helps your ministry, you can <a href="#" onClick={e=>e.preventDefault()}>support it with a donation</a>. <span style={{color:"var(--muted)"}}>(Replace this link with your Ko-fi, Buy Me a Coffee, or PayPal.)</span></div>
          <p className="fnote" style={{marginTop:"14px"}}>
            SermonCraft is a starting point and study aid — not a replacement for your own prayer, study, and voice. Please review everything before you preach or teach it. Original-language details generated by AI should be checked against a trusted lexicon. “AI-powered sermon tools for pastors.”
          </p>
        </div>
      </footer>
      {authMode && <AuthModal mode={authMode} setMode={setAuthMode} onClose={()=>setAuthMode(null)} />}
    </AuthCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
